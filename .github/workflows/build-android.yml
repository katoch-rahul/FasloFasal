name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/android-app-conversion-scxbtp'
      - 'claude/latest-app-build-huouds'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      # Buildozer's default Android platform directory. We pre-provision the
      # SDK here so buildozer finds a working sdkmanager and skips its own
      # (flaky) download/install logic.
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            zip \
            unzip \
            wget \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-dev

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Cache .buildozer local dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-dot-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-dot-buildozer-

      - name: Install Buildozer and Cython
        run: pip install --upgrade buildozer cython virtualenv

      - name: Provision Android SDK (command-line tools + packages)
        run: |
          set -euo pipefail
          SDK_ROOT="$ANDROID_SDK_ROOT"
          SDK_MGR="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -f "$SDK_MGR" ]; then
            echo "Installing Android command-line tools into $SDK_ROOT"
            mkdir -p "$SDK_ROOT/cmdline-tools"
            cd "$SDK_ROOT/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            # The zip extracts to ./cmdline-tools; buildozer expects it at ./latest
            rm -rf latest
            mv cmdline-tools latest
            rm -f cmdline-tools.zip
          else
            echo "Android command-line tools already present (cache hit)"
          fi

          # Accept all licenses (idempotent) and install the packages buildozer needs.
          yes | "$SDK_MGR" --sdk_root="$SDK_ROOT" --licenses >/dev/null
          "$SDK_MGR" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FasloFasal-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          retention-days: 7
