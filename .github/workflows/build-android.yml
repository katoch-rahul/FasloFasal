name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/android-app-conversion-scxbtp'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-dev

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Cache .buildozer local dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-dot-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-dot-buildozer-

      - name: Install Buildozer and Cython
        run: pip install --upgrade buildozer cython virtualenv

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          # Pre-populate license hashes so sdkmanager never prompts
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license"
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build debug APK (pass 1 – download SDK)
        id: build_pass1
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log || true
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Accept SDK licenses after download
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          SDK_MGR="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDK_MGR" ]; then
            yes | "$SDK_MGR" --licenses 2>/dev/null || true
            "$SDK_MGR" "build-tools;37.0.0" "platform-tools" "platforms;android-33" 2>&1 || true
          else
            echo "sdkmanager not yet present, skipping (cache hit expected)"
          fi
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build debug APK (pass 2 – real build)
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FasloFasal-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          retention-days: 7
